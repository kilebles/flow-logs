<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flow-stat</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d27; border-bottom: 1px solid #2d3348; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .badge { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; border-radius: 4px; padding: 2px 8px; font-size: 12px; }
    .controls { padding: 12px 24px; display: flex; gap: 8px; align-items: center; background: #1a1d27; border-bottom: 1px solid #2d3348; }
    .controls label { font-size: 13px; color: #94a3b8; }
    .controls select { background: #252836; border: 1px solid #3d4461; color: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 13px; }
    .controls button { background: #3b5bdb; color: white; border: none; padding: 5px 14px; border-radius: 4px; font-size: 13px; cursor: pointer; }
    .controls button:hover { background: #4c6ef5; }
    .last-updated { margin-left: auto; font-size: 12px; color: #64748b; }
    .container { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
    .section-title { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .chart-card { background: #1a1d27; border: 1px solid #2d3348; border-radius: 8px; padding: 16px; }
    .chart-card canvas { max-height: 200px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #1e2235; color: #64748b; text-align: left; padding: 8px 12px; font-weight: 500; border-bottom: 1px solid #2d3348; white-space: nowrap; }
    td { padding: 7px 12px; border-bottom: 1px solid #1a1d27; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e2235; }
    .table-card { background: #1a1d27; border: 1px solid #2d3348; border-radius: 8px; overflow: hidden; }
    .num-bad  { color: #ef4444; font-weight: 600; }
    .num-warn { color: #f59e0b; font-weight: 600; }
    .num-ok   { color: #4a5568; }
    .num-good { color: #22c55e; font-weight: 600; }
    .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .tag-403   { background: #ef444422; color: #ef4444; }
    .tag-429   { background: #f59e0b22; color: #f59e0b; }
    .tag-quota { background: #a855f722; color: #a855f7; }
    .tag-cool  { background: #3b82f622; color: #3b82f6; }
    .tag-401   { background: #ef444444; color: #fca5a5; }
    .tag-ip    { background: #f9731622; color: #fb923c; }
    .tag-dead  { background: #6b728022; color: #94a3b8; }
    .tag-ok    { background: #22c55e22; color: #22c55e; }
    .tag-sys   { background: #a855f733; color: #c084fc; }
    .status-ok   { color: #22c55e; font-size: 12px; }
    .status-warn { color: #f59e0b; font-size: 12px; }
    .status-err  { color: #ef4444; font-size: 12px; }
    .mono { font-family: monospace; font-size: 11px; color: #94a3b8; }
    .msg-cell { max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; color: #64748b; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 1100px) { .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>flow-stat</h1>
    <span class="badge" id="status-badge">loading...</span>
  </div>
  <div class="controls">
    <label>Window:</label>
    <select id="hours-select">
      <option value="1">1h</option>
      <option value="2" selected>2h</option>
      <option value="6">6h</option>
      <option value="12">12h</option>
      <option value="24">24h</option>
    </select>
    <button onclick="loadAll()">Refresh</button>
    <span class="last-updated" id="last-updated"></span>
  </div>

  <div class="container">
    <div>
      <div class="section-title">Timeline</div>
      <div class="chart-card">
        <canvas id="timeline-chart"></canvas>
      </div>
    </div>

    <div>
      <div class="section-title">Accounts</div>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Account</th>
              <th>Status</th>
              <th>Current proxy</th>
              <th>403s</th>
              <th>429s</th>
              <th>IP banned</th>
              <th>Cooldowns</th>
              <th>Dolphin err</th>
              <th>Tok timeout</th>
              <th>Success</th>
              <th>Last event</th>
            </tr>
          </thead>
          <tbody id="accounts-tbody">
            <tr><td colspan="11" style="color:#64748b;text-align:center;padding:20px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="grid2">
      <div>
        <div class="section-title">Proxies</div>
        <div class="table-card">
          <table>
            <thead>
              <tr>
                <th>Proxy (host:port)</th>
                <th>Accounts</th>
                <th>403s</th>
                <th>IP banned</th>
                <th>Dead</th>
                <th>Last seen</th>
              </tr>
            </thead>
            <tbody id="proxies-tbody">
              <tr><td colspan="6" style="color:#64748b;text-align:center;padding:20px">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div>
        <div class="section-title">Recent errors</div>
        <div class="table-card">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Type</th>
                <th>Account</th>
                <th>Proxy</th>
                <th>Message</th>
              </tr>
            </thead>
            <tbody id="errors-tbody">
              <tr><td colspan="5" style="color:#64748b;text-align:center;padding:20px">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<script>
let timelineChart = null;

function hours() { return document.getElementById('hours-select').value; }

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-GB', { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function statusCell(r) {
  if (r.dolphin_down) return '<span class="status-err">● Dolphin DOWN</span>';
  if (r.on_cooldown || r.quotas > 0) return '<span class="status-err">● Cooldown</span>';
  if (r.errors_403 >= 4) return '<span class="status-warn">● Errors</span>';
  if (r.ip_prohibited > 0) return '<span class="status-warn">● IP banned</span>';
  return '<span class="status-ok">● OK</span>';
}

function num(n, warnAt, errAt) {
  if (!n || n === 0) return '<span class="num-ok">0</span>';
  if (errAt && n >= errAt) return `<span class="num-bad">${n}</span>`;
  if (warnAt && n >= warnAt) return `<span class="num-warn">${n}</span>`;
  return `<span class="num-good">${n}</span>`;
}

function numErr(n) { return num(n, 1, 3); }
function numWarn(n) { return num(n, 1, null); }

function eventTag(type) {
  const map = {
    '403': 'tag-403', '429': 'tag-429',
    'quota': 'tag-quota', 'cooldown': 'tag-cool',
    '401': 'tag-401', 'ip_prohibited': 'tag-ip',
    'proxy_dead': 'tag-dead',
    'dolphin_500': 'tag-sys', 'unresponsive': 'tag-sys',
    'producer_crashed': 'tag-sys', 'token_timeout': 'tag-sys', 'rotation_failed': 'tag-sys',
    'success': 'tag-ok', 'filtered': 'tag-dead',
  };
  const cls = map[type] || 'tag-dead';
  return `<span class="tag ${cls}">${type || '?'}</span>`;
}

async function loadAccounts() {
  const res = await fetch(`/api/accounts?hours=${hours()}`);
  const data = await res.json();
  const tbody = document.getElementById('accounts-tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="11" style="color:#64748b;text-align:center">No data</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td><b>${r.account}</b></td>
      <td>${statusCell(r)}</td>
      <td class="mono">${r.current_proxy || '<span style="color:#4a5568">—</span>'}</td>
      <td>${numErr(r.errors_403)}</td>
      <td>${numErr(r.errors_429)}</td>
      <td>${numErr(r.ip_prohibited)}</td>
      <td>${numWarn(r.cooldowns)}</td>
      <td>${numErr(r.dolphin_errors)}</td>
      <td>${numErr(r.token_timeouts)}</td>
      <td>${r.successes > 0 ? `<span class="num-good">${r.successes}</span>` : '<span class="num-ok">0</span>'}</td>
      <td class="mono">${fmtDateTime(r.last_event)}</td>
    </tr>
  `).join('');
}

async function loadProxies() {
  const res = await fetch(`/api/proxies?hours=${hours()}`);
  const data = await res.json();
  const tbody = document.getElementById('proxies-tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="color:#64748b;text-align:center">No data</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td class="mono">${r.proxy}</td>
      <td style="font-size:12px;color:#94a3b8">${(r.accounts || []).join(', ') || '—'}</td>
      <td>${numErr(r.errors_403)}</td>
      <td>${numErr(r.ip_prohibited)}</td>
      <td>${r.dead_count > 0 ? `<span class="num-bad">${r.dead_count}</span>` : '<span class="num-ok">0</span>'}</td>
      <td class="mono">${fmtDateTime(r.last_seen)}</td>
    </tr>
  `).join('');
}

async function loadErrors() {
  const res = await fetch('/api/errors?limit=60');
  const data = await res.json();
  const tbody = document.getElementById('errors-tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:#64748b;text-align:center">No errors</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td class="mono">${fmtDateTime(r.ts)}</td>
      <td>${eventTag(r.event_type)}</td>
      <td style="font-size:12px">${r.account || '<span style="color:#4a5568">—</span>'}</td>
      <td class="mono">${r.proxy || '<span style="color:#4a5568">—</span>'}</td>
      <td class="msg-cell" title="${(r.message || '').replace(/"/g, '&quot;')}">${r.message || ''}</td>
    </tr>
  `).join('');
}

async function loadTimeline() {
  const res = await fetch(`/api/timeline?hours=${hours()}`);
  const data = await res.json();

  const labels = data.map(r => fmtTime(r.bucket));
  if (timelineChart) timelineChart.destroy();

  const ctx = document.getElementById('timeline-chart').getContext('2d');
  timelineChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Success', data: data.map(r => r.successes), borderColor: '#22c55e', backgroundColor: '#22c55e18', tension: 0.3, fill: true, pointRadius: 2 },
        { label: '403 errors', data: data.map(r => r.errors_403), borderColor: '#ef4444', backgroundColor: '#ef444418', tension: 0.3, fill: true, pointRadius: 2 },
        { label: 'IP banned', data: data.map(r => r.ip_prohibited), borderColor: '#fb923c', backgroundColor: 'transparent', tension: 0.3, pointRadius: 2 },
        { label: 'Rotations', data: data.map(r => r.rotations), borderColor: '#3b82f6', backgroundColor: 'transparent', tension: 0.3, pointRadius: 2 },
        { label: 'System err', data: data.map(r => r.system_errors), borderColor: '#c084fc', backgroundColor: 'transparent', tension: 0.3, pointRadius: 2 },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 12, font: { size: 12 } } } },
      scales: {
        x: { ticks: { color: '#64748b', maxTicksLimit: 12, font: { size: 11 } }, grid: { color: '#1e2235' } },
        y: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: '#1e2235' }, beginAtZero: true }
      }
    }
  });
}

async function loadAll() {
  await Promise.all([loadAccounts(), loadProxies(), loadErrors(), loadTimeline()]);
  document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  document.getElementById('status-badge').textContent = 'live';
}

document.getElementById('hours-select').addEventListener('change', loadAll);
loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
